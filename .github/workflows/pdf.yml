name: PDF build

on:
  push:
    branches: [main]
    paths:
      - "paper/**"
      - ".github/workflows/pdf.yml"
  pull_request:
    branches: [main]
    paths:
      - "paper/**"
      - ".github/workflows/pdf.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove the pre-existing committed PDF
        run: rm -f paper/a211420_formalized.pdf
      - name: Compile the proof paper
        uses: xu-cheng/latex-action@v4
        with:
          root_file: paper/a211420_formalized.tex
          work_in_root_file_dir: true
          texlive_version: 2026
          os: debian
      - name: Upload compiled proof PDF
        uses: actions/upload-artifact@v4
        with:
          name: a211420-formalized-pdf
          path: paper/a211420_formalized.pdf
          if-no-files-found: error
