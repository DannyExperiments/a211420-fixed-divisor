name: Lean verification

on:
  push:
    branches: [main]
    paths:
      - "*.lean"
      - "**/*.lean"
      - "lean-toolchain"
      - "lake-manifest.json"
      - "scripts/verify.sh"
      - ".github/workflows/lean.yml"
  pull_request:
    branches: [main]
    paths:
      - "*.lean"
      - "**/*.lean"
      - "lean-toolchain"
      - "lake-manifest.json"
      - "scripts/verify.sh"
      - ".github/workflows/lean.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and independently check Lean declarations
        uses: leanprover/lean-action@v1
        with:
          build: true
          nanoda: true
          nanoda-allow-sorry: false
          use-mathlib-cache: true
      - name: Reject forbidden project proof escapes
        run: ./scripts/verify.sh
